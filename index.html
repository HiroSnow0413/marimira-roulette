<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>マリミラルーレット</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="src/styles.css" rel="stylesheet">
</head>

<body class="py-4">

    <div class="container text-center">
        <h1 id="page-title" class="display-6 fw-bold mb-4" style="color: #3385ff;">マリミラルーレット</h1>

        <div class="roulette-wrapper">
            <div class="indicator"></div>
            <svg id="wheel-svg" viewBox="0 0 100 100">
                <g id="wheel-group"></g>
            </svg>
        </div>

        <div class="mt-4 px-3">
            <button id="spin-btn" class="btn btn-primary btn-spin" onclick="spin()" disabled>読み込み中...</button>
        </div>
    </div>

    <div class="modal fade" id="resultModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title fw-bold">当たり！：<span id="hit-item"></span></h5>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-outline-secondary px-4 py-2 rounded-pill"
                        onclick="closeModal()">閉じる</button>
                    <button type="button" class="btn btn-primary px-4 py-2 rounded-pill fw-bold"
                        onclick="closeAndSpin()">もう一度回す</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="src/script.js"></script>
</body>

</html>
